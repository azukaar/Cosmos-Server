basePath: /cosmos
definitions:
  configapi.CreateAPITokenRequest:
    properties:
      description:
        type: string
      ipWhitelist:
        items:
          type: string
        type: array
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/utils.Permission'
        type: array
      readOnly:
        type: boolean
      restrictToConstellation:
        type: boolean
    required:
    - name
    type: object
  configapi.DNSConfigRequest:
    properties:
      customDNSEntries:
        items:
          $ref: '#/definitions/utils.ConstellationDNSEntry'
        type: array
      dnsAdditionalBlocklists:
        items:
          type: string
        type: array
      dnsBlockBlacklist:
        type: boolean
      dnsFallback:
        type: string
      dnsPort:
        type: string
    type: object
  configapi.DashboardRoute:
    properties:
      ContainerIcon:
        type: string
      ContainerRunning:
        description: Container info (for SERVAPP routes)
        type: boolean
      Description:
        type: string
      HideFromDashboard:
        type: boolean
      Host:
        type: string
      Icon:
        type: string
      Mode:
        type: string
      Name:
        type: string
      PathPrefix:
        type: string
      Target:
        type: string
      UseHost:
        type: boolean
      UsePathPrefix:
        type: boolean
    type: object
  configapi.DeleteAPITokenRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  configapi.UpdateAPITokenRequest:
    properties:
      description:
        type: string
      ipWhitelist:
        items:
          type: string
        type: array
      permissions:
        items:
          $ref: '#/definitions/utils.Permission'
        type: array
      restrictToConstellation:
        type: boolean
    type: object
  configapi.UpdateRouteRequest:
    properties:
      newRoute:
        $ref: '#/definitions/utils.ProxyRouteConfig'
      operation:
        type: string
      routeName:
        type: string
    required:
    - operation
    type: object
  constellation.DeviceBlockRequestJSON:
    properties:
      block:
        type: boolean
      deviceName:
        maxLength: 32
        minLength: 3
        type: string
      nickname:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - deviceName
    - nickname
    type: object
  constellation.DeviceCreateRequestJSON:
    properties:
      PublicHostname:
        type: string
      cosmosNode:
        type: integer
      deviceName:
        maxLength: 32
        minLength: 3
        type: string
      invisible:
        type: boolean
      ip:
        type: string
      isExitNode:
        type: boolean
      isLighthouse:
        description: for lighthouse only
        type: boolean
      isLoadBalancer:
        type: boolean
      isRelay:
        type: boolean
      nickname:
        description: for devices only
        maxLength: 32
        type: string
      port:
        type: string
      publicKey:
        type: string
    required:
    - deviceName
    - ip
    - nickname
    type: object
  constellation.DeviceEditRequestJSON:
    properties:
      isExitNode:
        type: boolean
      isLighthouse:
        type: boolean
      isLoadBalancer:
        type: boolean
      isRelay:
        type: boolean
    type: object
  container.Config:
    properties:
      argsEscaped:
        description: True if command is already escaped (meaning treat as a command
          line) (Windows specific).
        type: boolean
      attachStderr:
        description: Attach the standard error
        type: boolean
      attachStdin:
        description: Attach the standard input, makes possible user interaction
        type: boolean
      attachStdout:
        description: Attach the standard output
        type: boolean
      cmd:
        description: Command to run when starting the container
        items:
          type: string
        type: array
      domainname:
        description: Domainname
        type: string
      entrypoint:
        description: Entrypoint to run when starting the container
        items:
          type: string
        type: array
      env:
        description: List of environment variable to set in the container
        items:
          type: string
        type: array
      exposedPorts:
        allOf:
        - $ref: '#/definitions/nat.PortSet'
        description: List of exposed ports
      healthcheck:
        allOf:
        - $ref: '#/definitions/container.HealthConfig'
        description: Healthcheck describes how to check the container is healthy
      hostname:
        description: Hostname
        type: string
      image:
        description: Name of the image as it was passed by the operator (e.g. could
          be symbolic)
        type: string
      labels:
        additionalProperties:
          type: string
        description: List of labels set to this container
        type: object
      macAddress:
        description: |-
          Mac Address of the container.

          Deprecated: this field is deprecated since API v1.44. Use EndpointSettings.MacAddress instead.
        type: string
      networkDisabled:
        description: Is network disabled
        type: boolean
      onBuild:
        description: ONBUILD metadata that were defined on the image Dockerfile
        items:
          type: string
        type: array
      openStdin:
        description: Open stdin
        type: boolean
      shell:
        description: Shell for shell-form of RUN, CMD, ENTRYPOINT
        items:
          type: string
        type: array
      stdinOnce:
        description: If true, close stdin after the 1 attached client disconnects.
        type: boolean
      stopSignal:
        description: Signal to stop a container
        type: string
      stopTimeout:
        description: Timeout (in seconds) to stop a container
        type: integer
      tty:
        description: Attach standard streams to a tty, including stdin if it is not
          closed.
        type: boolean
      user:
        description: User that will run the command(s) inside the container, also
          support user:group
        type: string
      volumes:
        additionalProperties:
          type: object
        description: List of volumes (mounts) used for the container
        type: object
      workingDir:
        description: Current directory (PWD) in the command will be launched
        type: string
    type: object
  container.HealthConfig:
    properties:
      interval:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: Zero means to inherit. Durations are expressed as integer nanoseconds.
      retries:
        description: |-
          Retries is the number of consecutive failures needed to consider a container as unhealthy.
          Zero means inherit.
        type: integer
      startInterval:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: The interval to attempt healthchecks at during the start period
      startPeriod:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: The start period for the container to initialize before the retries
          starts to count down.
      test:
        description: |-
          Test is the test to perform to check that the container is healthy.
          An empty slice means to inherit the default.
          The options are:
          {} : inherit healthcheck
          {"NONE"} : disable healthcheck
          {"CMD", args...} : exec arguments directly
          {"CMD-SHELL", command} : run command with system's default shell
        items:
          type: string
        type: array
      timeout:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: Timeout is the time to wait before considering the check to have
          hung.
    type: object
  cron.JobRequestJSON:
    properties:
      name:
        maxLength: 32
        minLength: 3
        type: string
      scheduler:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - name
    - scheduler
    type: object
  docker.ContainerCreateRequestContainer:
    properties:
      cap_add:
        items:
          type: string
        type: array
      cap_drop:
        items:
          type: string
        type: array
      command:
        type: string
      container_name:
        type: string
      cpu_shares:
        type: integer
      cpus:
        type: number
      cpuset_cpus:
        type: string
      depends_on:
        additionalProperties:
          $ref: '#/definitions/docker.ContainerCreateRequestContainerDependsOnCont'
        type: object
      devices:
        items:
          type: string
        type: array
      dns:
        items:
          type: string
        type: array
      dns_search:
        items:
          type: string
        type: array
      domainname:
        type: string
      entrypoint:
        type: string
      environment:
        items:
          type: string
        type: array
      expose:
        items:
          type: string
        type: array
      extra_hosts:
        items:
          type: string
        type: array
      gid:
        type: integer
      healthcheck:
        $ref: '#/definitions/docker.ContainerCreateRequestContainerHealthcheck'
      hostname:
        type: string
      image:
        type: string
      isolation:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      links:
        items:
          type: string
        type: array
      mac_address:
        type: string
      mem_limit:
        description: Resource constraints
        type: string
      mem_reservation:
        type: string
      network_mode:
        type: string
      networks:
        additionalProperties:
          $ref: '#/definitions/docker.ContainerCreateRequestServiceNetwork'
        type: object
      ports:
        items:
          type: string
        type: array
      post_install:
        items:
          type: string
        type: array
      privileged:
        type: boolean
      restart:
        type: string
      routes:
        items:
          $ref: '#/definitions/utils.ProxyRouteConfig'
        type: array
      runtime:
        type: string
      security_opt:
        items:
          type: string
        type: array
      stdin_open:
        type: boolean
      stop_grace_period:
        type: integer
      stop_signal:
        type: string
      storage_opt:
        additionalProperties:
          type: string
        type: object
      sysctls:
        additionalProperties:
          type: string
        type: object
      tty:
        type: boolean
      uid:
        type: integer
      user:
        type: string
      volumes:
        items:
          $ref: '#/definitions/mount.Mount'
        type: array
      working_dir:
        type: string
    required:
    - image
    type: object
  docker.ContainerCreateRequestContainerDependsOnCont:
    properties:
      condition:
        type: string
      restart:
        type: string
    type: object
  docker.ContainerCreateRequestContainerHealthcheck:
    properties:
      interval:
        type: integer
      retries:
        type: integer
      start_period:
        type: integer
