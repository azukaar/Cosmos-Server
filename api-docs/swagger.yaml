        items:
          type: string
        type: array
      timeout:
        type: integer
    type: object
  docker.ContainerCreateRequestNetwork:
    properties:
      attachable:
        type: boolean
      driver:
        type: string
      enable_ipv6:
        type: boolean
      internal:
        type: boolean
      ipam:
        properties:
          config:
            items:
              $ref: '#/definitions/docker.ContainerCreateRequestNetworkIPAMConfig'
            type: array
          driver:
            type: string
        type: object
      labels:
        additionalProperties:
          type: string
        type: object
      name:
        description: name must be unique
        type: string
    type: object
  docker.ContainerCreateRequestNetworkIPAMConfig:
    properties:
      gateway:
        type: string
      subnet:
        type: string
    type: object
  docker.ContainerCreateRequestServiceNetwork:
    properties:
      aliases:
        items:
          type: string
        type: array
      ipv4_address:
        type: string
      ipv6_address:
        type: string
    type: object
  docker.ContainerCreateRequestVolume:
    properties:
      driver:
        type: string
      name:
        description: name must be unique
        type: string
      source:
        type: string
      target:
        type: string
    type: object
  docker.ContainerForm:
    properties:
      Volumes:
        items:
          $ref: '#/definitions/mount.Mount'
        type: array
      cpus:
        type: number
      devices:
        items:
          type: string
        type: array
      envVars:
        items:
          type: string
        type: array
      image:
        type: string
      interactive:
        description: we make this a int so that we can ignore 0
        type: integer
      labels:
        additionalProperties:
          type: string
        type: object
      memLimit:
        type: string
      networkMode:
        type: string
      portBindings:
