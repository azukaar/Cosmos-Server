  docker.DockerServiceCreateRequest:
    properties:
      networks:
        additionalProperties:
          $ref: '#/definitions/docker.ContainerCreateRequestNetwork'
        type: object
      services:
        additionalProperties:
          $ref: '#/definitions/docker.ContainerCreateRequestContainer'
        type: object
      volumes:
        additionalProperties:
          $ref: '#/definitions/docker.ContainerCreateRequestVolume'
        type: object
    type: object
  docker.VolumeCreateRequest:
    properties:
      driver:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  docker.createNetworkPayload:
    properties:
      attachCosmos:
        type: boolean
      driver:
        type: string
      name:
        type: string
      parentInterface:
        type: string
      subnet:
        type: string
    required:
