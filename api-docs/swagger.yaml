      homepageConfig:
        $ref: '#/definitions/utils.HomepageConfig'
      httpconfig:
        $ref: '#/definitions/utils.HTTPConfig'
      incrBackupOutputDir:
        type: string
      licence:
        type: string
      loggingLevel:
        type: string
      marketConfig:
        $ref: '#/definitions/utils.MarketConfig'
      mongoDB:
        type: string
      monitoringAlerts:
        additionalProperties:
          $ref: '#/definitions/utils.Alert'
        type: object
      monitoringDisabled:
        type: boolean
      mpdn_:
        type: string
      mpdu_:
        type: string
      newInstall:
        type: boolean
      openIDClients:
        items:
          $ref: '#/definitions/utils.OpenIDClient'
        type: array
      remoteStorage:
        $ref: '#/definitions/utils.RemoteStorageConfig'
      requireMFA:
        type: boolean
      serverCountry:
        type: string
      serverToken:
        type: string
      storage:
        $ref: '#/definitions/utils.StorageConfig'
      themeConfig:
        $ref: '#/definitions/utils.ThemeConfig'
    required:
    - emailConfig
    - httpconfig
    type: object
  image.Metadata:
    properties:
      lastTagTime:
        description: LastTagTime is the date and time at which the image was last
          tagged.
        type: string
    type: object
  main.NewInstallJSON:
    properties:
      allowHTTPLocalIPAccess:
        type: boolean
      dnsChallengeProvider:
        type: string
      dnschallengeConfig:
        additionalProperties:
          type: string
        type: object
      hostname:
        type: string
      httpsCertificateMode:
        type: string
      mongodb:
        type: string
      mongodbMode:
        type: string
      nickname:
        type: string
      omitempty:
        type: string
      password:
        type: string
      sslEmail:
        type: string
      step:
        type: string
      tlsCert:
        type: string
      tlsKey:
        type: string
      useWildcardCertificate:
        type: boolean
