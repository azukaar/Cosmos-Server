  mount.BindOptions:
    properties:
      createMountpoint:
        type: boolean
      nonRecursive:
        type: boolean
      propagation:
        $ref: '#/definitions/mount.Propagation'
      readOnlyForceRecursive:
        description: ReadOnlyForceRecursive raises an error if the mount cannot be
          made recursively read-only.
        type: boolean
      readOnlyNonRecursive:
        description: |-
          ReadOnlyNonRecursive makes the mount non-recursively read-only, but still leaves the mount recursive
          (unless NonRecursive is set to true in conjunction).
        type: boolean
    type: object
  mount.ClusterOptions:
    type: object
  mount.Consistency:
    enum:
    - consistent
    - cached
    - delegated
    - default
    type: string
    x-enum-varnames:
    - ConsistencyFull
    - ConsistencyCached
    - ConsistencyDelegated
    - ConsistencyDefault
  mount.Driver:
    properties:
      name:
        type: string
      options:
        additionalProperties:
          type: string
        type: object
    type: object
  mount.Mount:
    properties:
      bindOptions:
        $ref: '#/definitions/mount.BindOptions'
      clusterOptions:
        $ref: '#/definitions/mount.ClusterOptions'
      consistency:
        $ref: '#/definitions/mount.Consistency'
      readOnly:
        description: attempts recursive read-only if possible
        type: boolean
      source:
        description: |-
          Source specifies the name of the mount. Depending on mount type, this
          may be a volume name or a host path, or even ignored.
          Source is not supported for tmpfs (must be an empty value)
        type: string
      target:
        type: string
      tmpfsOptions:
        $ref: '#/definitions/mount.TmpfsOptions'
      type:
        $ref: '#/definitions/mount.Type'
      volumeOptions:
        $ref: '#/definitions/mount.VolumeOptions'
    type: object
  mount.Propagation:
    enum:
    - rprivate
    - private
    - rshared
    - shared
    - rslave
    - slave
    type: string
    x-enum-varnames:
    - PropagationRPrivate
    - PropagationPrivate
    - PropagationRShared
    - PropagationShared
    - PropagationRSlave
    - PropagationSlave
  mount.TmpfsOptions:
    properties:
      mode:
        allOf:
        - $ref: '#/definitions/os.FileMode'
        description: Mode of the tmpfs upon creation
      sizeBytes:
        description: |-
          Size sets the size of the tmpfs, in bytes.

          This will be converted to an operating system specific value
          depending on the host. For example, on linux, it will be converted to
          use a 'k', 'm' or 'g' syntax. BSD, though not widely supported with
          docker, uses a straight byte value.

          Percentages are not supported.
        type: integer
    type: object
  mount.Type:
    enum:
    - bind
    - volume
    - tmpfs
    - npipe
    - cluster
    type: string
    x-enum-varnames:
    - TypeBind
    - TypeVolume
    - TypeTmpfs
    - TypeNamedPipe
    - TypeCluster
  mount.VolumeOptions:
    properties:
      driverConfig:
        $ref: '#/definitions/mount.Driver'
      labels:
        additionalProperties:
          type: string
        type: object
      noCopy:
        type: boolean
      subpath:
        type: string
    type: object
  nat.PortBinding:
    properties:
      HostIp:
        description: HostIP is the host IP Address
        type: string
      hostPort:
        description: HostPort is the host port number
        type: string
    type: object
  nat.PortMap:
    additionalProperties:
      items:
        $ref: '#/definitions/nat.PortBinding'
      type: array
    type: object
  nat.PortSet:
    additionalProperties:
      type: object
    type: object
  os.FileMode:
    enum:
    - 2147483648
    - 1073741824
    - 536870912
    - 268435456
    - 134217728
    - 67108864
    - 33554432
    - 16777216
    - 8388608
    - 4194304
    - 2097152
    - 1048576
    - 524288
    - 2401763328
    - 511
    - 2147483648
    - 1073741824
    - 536870912
    - 268435456
    - 134217728
    - 67108864
    - 33554432
    - 16777216
    - 8388608
    - 4194304
    - 2097152
    - 1048576
    - 524288
    - 2401763328
    - 511
