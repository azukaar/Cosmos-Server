    - 'D: device file'
    - 'p: named pipe (FIFO)'
    - 'S: Unix domain socket'
    - 'u: setuid'
    - 'g: setgid'
    - 'c: Unix character device, when ModeDevice is set'
    - 't: sticky'
    - '?: non-regular file; nothing else is known about this file'
    - ""
    - Unix permission bits, 0o777
    x-enum-varnames:
